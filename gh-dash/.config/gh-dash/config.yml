prSections:
  - title: Needs Team Review
    filters: is:open team-review-requested:ef-global/global-creative-devs draft:false -author:@me -org:eftours
  - title: Needs My Review
    filters: is:open review-requested:@me draft:false -author:@me -org:eftours
  - title: Mine not reviewed @ef-global
    filters: is:open author:@me review:none draft:false org:ef-global
  - title: Mine reviewed @ef-global
    filters: type:pr is:open author:@me draft:false user:ef-global -review:none
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Involved
    filters: is:open involves:@me -author:@me draft:false -org:eftours
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Backpack
    filters: is:open repo:ef-global/backpack
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
defaults:
  preview:
    open: true
    width: 50
  prsLimit: 20
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 30
      author:
        width: 15
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  issues: []
  prs:
    - key: C
      name: code review
      command: >
        cmux new-workspace --command
        'cd {{.RepoPath}} && cmux rename-workspace "{{.HeadRefName}} #{{.PrNumber}}" && wt switch pr:{{.PrNumber}} -x "claude -p \"use /code-review:code-review to review PR #{{.PrNumber}} and comment on it with the results\""'
repoPaths:
  ef-global/backpack: ~/Documents/projects/backpack
  ef-global/backpack-boilerplate-packages: ~/Documents/projects/backpack-boiler-pkgs
  ef-global/backpack-header-monorepo: ~/Documents/projects/backpack-header-monorepo
  ef-global/backpack-themes: ~/Documents/projects/backpack-themes
  ef-global/backpack-sb-plugins: ~/Documents/projects/backpack-sb-plugins
  ef-global/backpack-sb-plugins-react: ~/Documents/projects/backpack-sb-plugins-react
  ef-global/backpack.ef.design: ~/Documents/projects/backpack.ef.design
  ef-global/backpack-assets: ~/Documents/projects/backpack-assets
  ef-global/content-hub-monorepo: ~/Documents/projects/content-hub-monorepo
  ef-global/brand-hub: ~/Documents/projects/brand-hub
  ef-global/create-backpack: ~/Documents/projects/create-backpack
  ef-global/ef-code: ~/Documents/projects/ef-code
  ef-global/careers: ~/Documents/projects/careers
  ef-global/ef-sbc: ~/Documents/projects/ef-sbc
  ef-global/ef.design: ~/Documents/projects/ef.design
  ef-global/backpack-migrate: ~/Documents/projects/backpack-migrate
  ef-global/storyblok-nextjs-backpack-boilerplate: ~/Documents/projects/storyblok-nextjs-backpack-boilerplate
  ef-global/styles-dictionary-gud: ~/Documents/projects/backpack-tokens
  ILC-Technology/product-sites: ~/Documents/projects/product-sites
  ILC-Technology/martech-toolkit: ~/Documents/projects/martech-toolkit
  ILC-Technology/martech-forms: ~/Documents/projects/martech-forms
  ef-central-efcom/cefcom-sb-central-sites: ~/Documents/projects/cefcom-sb-central-sites
  ef-central-efcom/cefcom-shared-components: ~/Documents/projects/cefcom-shared-components
theme:
  ui:
    table:
      showSeparator: true
pager:
  diff: ""
confirmQuit: false
smartFilteringAtLaunch: false
